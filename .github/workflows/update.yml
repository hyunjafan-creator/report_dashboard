name: Update Dashboard

on:
  schedule:
    - cron: '0 23 * * *'   # 08:00 KST
    - cron: '0 5 * * *'    # 14:00 KST
    - cron: '0 8 * * *'    # 17:00 KST
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build index.html
        shell: pwsh
        env:
          FN_USER_ID: ${{ secrets.FN_USER_ID }}
          FN_USER_PW: ${{ secrets.FN_USER_PW }}
        run: pwsh ./build/build_dashboard.ps1

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "auto update $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git push
          fi
