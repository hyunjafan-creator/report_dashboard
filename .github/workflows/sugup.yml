name: Update Sugup Dashboard

on:
  schedule:
    - cron: '0 23 * * *'   # 08:00 KST (전일 마감 데이터 기준 아침 브리핑용)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-sugup
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build sugup.html
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: node scripts/sugup_dashboard.js --outfile sugup.html

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sugup.html
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "auto update sugup $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git pull --rebase origin main
            git push
          fi
